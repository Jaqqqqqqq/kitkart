<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password</title>
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body class="auth-page">
  <main class="auth-panel">
    <div>
      <a href="/profile" class="back-link">Profile</a>
      <p class="eyebrow">Customer</p>
      <h1>Change Password</h1>
      <p class="meta-copy">Enter and confirm your new password.</p>
    </div>

    <p id="passwordMessage" class="hidden"></p>

    <form id="passwordForm" action="/profile/password" method="POST" class="auth-form">
      <div class="form-field">
        <label for="password">New Password</label>
        <input id="password" name="password" type="password" required>
      </div>
      <div class="form-field">
        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" name="confirm_password" type="password" required>
      </div>
      <button type="submit">Change Password</button>
    </form>
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    $('#passwordForm').on('submit', function (event) {
      event.preventDefault();
      $.ajax({
        url: '/profile/password',
        method: 'POST',
        data: $(this).serialize(),
        success: function (response) {
          $('#passwordMessage').removeClass('hidden').text(response || 'Password changed successfully.');
        },
        error: function (xhr) {
          $('#passwordMessage').removeClass('hidden').text(xhr.responseText || 'Unable to change password.');
        }
      });
    });
  </script>
</body>
</html>
