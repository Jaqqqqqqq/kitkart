<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product</title>
  <link rel="stylesheet" href="/css/catalog.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <main class="dashboard-panel">
    <p><a href="/shop">Back to shop</a></p>
    <h1 id="productName"></h1>
    <p id="productCategory"></p>
    <p id="productPrice"></p>
    <p id="productStock"></p>
    <p id="productDescription"></p>
  </main>
  <script>
    $(function () {
      const id = window.location.pathname.split('/').filter(Boolean).pop();
      $.getJSON('/api/v1/products/' + id, function (response) {
        const product = response.result;
        $('#productName').text(product.product_name || '');
        $('#productCategory').text(product.Category?.category_name || '');
        $('#productPrice').text('PHP ' + Number(product.price).toFixed(2));
        $('#productStock').text('Stock: ' + (product.stock_quantity || 0));
        $('#productDescription').text(product.description || 'No description available.');
      });
    });
  </script>
</body>
</html>
