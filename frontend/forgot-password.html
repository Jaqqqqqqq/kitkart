<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body class="auth-page">
  <main class="auth-panel">
    <div>
      <a href="/auth/login" class="back-link">Login</a>
      <p class="eyebrow">Kitkart</p>
      <h1>Forgot Password</h1>
      <p class="meta-copy">Enter your email, then set and confirm a new password.</p>
    </div>

    <p id="forgotError" class="form-error hidden"></p>
    <p id="forgotSuccess" class="info-alert hidden"></p>

    <form action="/auth/forgot-password" method="POST" id="forgotForm" class="auth-form">
      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>
      </div>

      <div class="form-field">
        <label for="password">New Password</label>
        <input id="password" name="password" type="password" required>
      </div>

      <div class="form-field">
        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" name="confirm_password" type="password" required>
      </div>

      <button type="submit">Change Password</button>
    </form>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    $('#forgotForm').on('submit', function (event) {
      event.preventDefault();

      $.ajax({
        url: '/auth/forgot-password',
        method: 'POST',
        data: $(this).serialize(),
        dataType: 'html',
        success: function () {
          $('#forgotError').addClass('hidden').text('');
          $('#forgotSuccess').removeClass('hidden').text('Password changed. You can now login.');
          showPopup('Password changed. You can now login.', 'success');
        },
        error: function (xhr) {
          const message = xhr.responseText || 'Unable to change password.';
          $('#forgotSuccess').addClass('hidden').text('');
          $('#forgotError').removeClass('hidden').text(message);
          showPopup(message, 'error');
        }
      });
    });
  </script>
</body>
</html>
