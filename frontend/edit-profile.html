<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile</title>
  <link rel="stylesheet" href="/css/catalog.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/ui.js"></script>
</head>
<body>
  <main class="dashboard-panel">
    <h1>Edit Profile</h1>
    <form id="profileForm">
      <input id="first_name" placeholder="First name">
      <input id="last_name" placeholder="Last name">
      <input id="email" type="email" placeholder="Email">
      <input id="phone" placeholder="Phone">
      <textarea id="address" placeholder="Address"></textarea>
      <button type="submit">Save</button>
    </form>
  </main>
  <script>
    $(function () {
      $.getJSON('/api/v1/me', function (response) {
        const user = response.result || {};
        $('#first_name').val(user.first_name || '');
        $('#last_name').val(user.last_name || '');
        $('#email').val(user.email || '');
        $('#phone').val(user.phone || '');
        $('#address').val(user.address || '');
      });
      $('#profileForm').on('submit', function (e) {
          e.preventDefault();
          $.ajax({
            method: 'POST',
            url: '/profile/edit',
            dataType: 'json',
            data: {
              first_name: $('#first_name').val(),
              last_name: $('#last_name').val(),
              email: $('#email').val(),
              phone: $('#phone').val(),
              address: $('#address').val()
            },
            success: function (data) {
              if (data && data.success) {
                showPopup(data.message || 'Profile updated.', 'success');
                setTimeout(function () { window.location.href = '/profile'; }, 600);
              } else {
                showPopup(data?.message || 'Save failed.', 'error');
              }
            },
            error: function (xhr) { showPopup(xhr.responseJSON?.message || xhr.responseText || 'Save failed.', 'error'); }
          });
        });
    });
  </script>
</body>
</html>
