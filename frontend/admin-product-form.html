<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><%= title %></title>
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body>
  <main class="page">
    <header class="catalog-header">
      <div>
        <a href="/admin/products" class="back-link">Back to products</a>
        <h1><%= title %></h1>
      </div>
    </header>

    <section class="cart-panel">
      <% if (error) { %>
        <p class="form-error"><%= error %></p>
      <% } %>

      <form
        action="<%= action %>"
        method="POST"
        enctype="multipart/form-data"
        class="admin-form js-admin-form js-api-form"
        id="productForm"
        data-api-url="<%= product.id ? '/api/v1/products/' + product.id : '/api/v1/products' %>"
        data-api-method="<%= product.id ? 'PUT' : 'POST' %>"
        data-redirect="/admin/products"
        data-has-main-image="<%= product.image ? 'true' : 'false' %>"
        novalidate>
        <input id="remove_main_image" type="hidden" name="remove_main_image" value="0">
        <div class="form-field">
          <label for="category_id">Category</label>
          <select id="category_id" name="category_id" required>
            <option value="">Select category</option>
            <% categories.forEach((category) => { %>
              <option value="<%= category.id %>" <%= String(product.category_id) === String(category.id) ? 'selected' : '' %>>
                <%= category.category_name %>
              </option>
            <% }) %>
          </select>
          <p class="field-help"></p>
        </div>

        <div class="form-field">
          <label for="product_name">Product name</label>
          <input id="product_name" name="product_name" value="<%= product.product_name %>" required>
          <p class="field-help"></p>
        </div>

        <div class="form-field">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="4"><%= product.description %></textarea>
          <p class="field-help"></p>
        </div>

        <div class="form-field">
          <label for="price">Price</label>
          <input id="price" name="price" type="number" min="0" step="0.01" value="<%= product.price %>" required>
          <p class="field-help"></p>
        </div>

        <div class="form-field">
          <label for="stock_quantity">Stock quantity</label>
          <input id="stock_quantity" name="stock_quantity" type="number" min="0" step="1" value="<%= product.stock_quantity %>" required>
          <p class="field-help"></p>
        </div>

        <% if (product.image) { %>
          <div class="form-field">
            <label>Current main image</label>
            <div class="image-list editable-image-list">
              <div class="editable-image">
                <img src="/images/<%= product.image %>" alt="<%= product.product_name %> main image">
                <button type="button" class="image-remove-btn js-remove-main-image" aria-label="Remove main image">x</button>
              </div>
            </div>
            <p class="field-help"></p>
          </div>
        <% } %>

        <div class="form-field">
          <label for="main_image">Main image</label>
          <input id="main_image" name="main_image" type="file" accept="image/*" <%= product.image ? '' : 'required' %>>
          <p class="field-help"></p>
        </div>

        <div class="form-field">
          <label for="gallery_images">Extra product images</label>
          <input id="gallery_images" name="gallery_images" type="file" accept="image/*" multiple>
          <p class="field-help"></p>
        </div>

        <% if (product.images && product.images.length > 0) { %>
          <div class="form-field">
            <label>Existing extra images</label>
            <div class="image-list editable-image-list">
              <% product.images.forEach((image) => { %>
                <div class="editable-image">
                  <img src="/images/<%= image.image_path %>" alt="<%= product.product_name %> extra image">
                  <button
                    type="button"
                    class="image-remove-btn js-remove-gallery-image"
                    data-id="<%= image.id %>"
                    aria-label="Remove extra image">
                    x
                  </button>
                </div>
              <% }) %>
            </div>
          </div>
        <% } %>

        <button type="submit">Save product</button>
      </form>
    </section>
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/admin-crud.js"></script>
</body>
</html>
