<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body>
  <main class="page">
    <header class="catalog-header">
      <div>
        <a href="/cart" class="back-link">Back to cart</a>
        <p class="eyebrow">Checkout</p>
        <h1>Confirm your order</h1>
        <p>Review your school supplies and choose a payment method.</p>
      </div>
    </header>

    <section class="cart-panel">
      <p id="checkoutError" class="form-error hidden"></p>

      <div id="emptyState" class="empty-message is-visible hidden">
        Your cart is empty.
        <p><a href="/shop">Browse products</a></p>
      </div>

      <div id="checkoutBody" class="hidden">
        <div class="cart-table-wrap">
          <table class="cart-table">
            <thead>
              <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
              </tr>
            </thead>
            <tbody id="checkoutItems"></tbody>
          </table>
        </div>

        <form id="checkoutForm" class="checkout-form">
          <label for="payment_method">Payment Method</label>
          <select id="payment_method" name="payment_method" required></select>
          <p>Total: PHP <strong id="checkoutTotal">0.00</strong></p>
          <button type="submit">Place Order</button>
        </form>
      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    $(function () {
      let paymentMethods = [];
      let currentTotal = 0;

      function money(value) {
        return Number(value).toFixed(2);
      }

      function loadCheckout() {
        $.ajax({
          url: '/api/v1/checkout',
          method: 'GET',
          dataType: 'json',
          success: function (response) {
            const items = response.result.items || [];
            paymentMethods = response.paymentMethods || [];
            currentTotal = response.result.total || 0;

            if (!items.length) {
              $('#emptyState').removeClass('hidden');
              $('#checkoutBody').addClass('hidden');
              return;
            }

            $('#emptyState').addClass('hidden');
            $('#checkoutBody').removeClass('hidden');
            $('#checkoutTotal').text(money(currentTotal));

            const $items = $('#checkoutItems');
            $items.empty();
            items.forEach(function (item) {
              $items.append(`
                <tr>
                  <td>${item.product_name}</td>
                  <td>PHP ${money(item.price)}</td>
                  <td>${item.quantity}</td>
                  <td>PHP ${money(item.subtotal)}</td>
                </tr>
              `);
            });

            const $payment = $('#payment_method');
            $payment.empty();
            paymentMethods.forEach(function (method) {
              $payment.append(`<option value="${method}">${method}</option>`);
            });
          },
          error: function (xhr) {
            $('#checkoutError').removeClass('hidden').text(xhr.responseJSON?.message || 'Unable to load checkout.');
          }
        });
      }

      $('#checkoutForm').on('submit', function (event) {
        event.preventDefault();

        $.ajax({
          url: '/api/v1/orders',
          method: 'POST',
          data: JSON.stringify({ payment_method: $('#payment_method').val() }),
          contentType: 'application/json',
          dataType: 'json',
          success: function (response) {
            showPopup(response.message || 'Order placed successfully. Receipt email is being sent.', 'success');
            setTimeout(function () {
              window.location.href = `/orders/${response.result.id}/confirmation`;
            }, 700);
          },
          error: function (xhr) {
            const message = xhr.responseJSON?.message || 'Checkout failed.';
            $('#checkoutError').removeClass('hidden').text(message);
            showPopup(message, 'error');
          }
        });
      });

      loadCheckout();
    });
  </script>
</body>
</html>
