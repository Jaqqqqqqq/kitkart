<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><%= title %></title>
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body class="dashboard-page">
  <main class="dashboard-panel">
    <div class="dashboard-hero">
      <div>
        <p class="eyebrow">Customer</p>
        <h1>School supplies home</h1>
        <p class="meta-copy">Welcome, <%= currentUser.first_name %>. Shop supplies, track orders, and keep your profile updated.</p>
      </div>

      <form action="/auth/logout" method="POST">
        <button type="submit" class="danger-button">Logout</button>
      </form>
    </div>

    <div class="hero-pills" style="margin-bottom: 14px;">
      <span class="pill brand">Quick shop</span>
      <span class="pill blue">Order tracking</span>
      <span class="pill sun">Profile and history</span>
    </div>

    <div class="dashboard-links">
      <a href="/shop">Shop</a>
      <a href="/cart">Cart</a>
      <a href="/orders">Order History</a>
      <a href="/profile">Profile</a>
    </div>
  </main>
</body>
</html>
