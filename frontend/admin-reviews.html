<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews</title>
  <link rel="stylesheet" href="/css/catalog.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <main class="dashboard-panel">
    <h1>Reviews</h1>
    <p><a href="/admin/dashboard">Back to dashboard</a></p>
    <table class="data-table" id="reviewsTable"><thead><tr><th>Product</th><th>Customer</th><th>Order</th><th>Rating</th><th>Review</th></tr></thead><tbody></tbody></table>
  </main>
  <script>
    $(function () {
      $.getJSON('/admin/api/reviews', function (response) {
        const rows = response.rows || [];
        $('#reviewsTable tbody').html(rows.map((review) => `
          <tr>
            <td>${review.product_name}</td>
            <td>${review.customer_name}<br>${review.customer_email}</td>
            <td>#${review.order_id}</td>
            <td>${review.rating}/5</td>
            <td>${review.review_text}</td>
          </tr>
        `).join('') || '<tr><td colspan="5">No reviews found.</td></tr>');
      });
    });
  </script>
</body>
</html>
