<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body class="auth-page">
  <main class="auth-panel">
    <div class="dashboard-hero">
      <div>
        <a href="/home" class="back-link">Home</a>
        <p class="eyebrow">Customer</p>
        <h1>Your profile</h1>
        <p class="meta-copy">Edit your account details for smoother checkout and order updates.</p>
      </div>
      <form action="/auth/logout" method="POST">
        <button type="submit" class="danger-button">Logout</button>
      </form>
    </div>

    <div class="hero-pills">
      <span class="pill brand">Account details</span>
      <span class="pill blue">Checkout info</span>
    </div>

    <p id="profileMessage" class="hidden"></p>

    <form id="profileForm" action="/profile" method="POST" class="auth-form">
      <div class="form-field">
        <label for="first_name">First Name</label>
        <input id="first_name" type="text" name="first_name" required>
      </div>
      <div class="form-field">
        <label for="last_name">Last Name</label>
        <input id="last_name" type="text" name="last_name" required>
      </div>
      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required>
      </div>
      <div class="form-field">
        <label for="phone">Phone</label>
        <input id="phone" type="text" name="phone">
      </div>
      <div class="form-field">
        <label for="address">Address</label>
        <textarea id="address" name="address" rows="3"></textarea>
      </div>
      <div class="hero-actions">
        <button type="submit">Save Changes</button>
        <a href="/profile/password" class="button-link">Change Password</a>
      </div>
    </form>
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    $(function () {
      // Try to fetch the current user (works with session cookie or token-based auth)
      $.getJSON('/api/v1/me', function (response) {
        const user = (response && response.result) || response || null;
        if (user && user.id) {
          $('#first_name').val(user.first_name || '');
          $('#last_name').val(user.last_name || '');
          $('#email').val(user.email || '');
          $('#phone').val(user.phone || '');
          $('#address').val(user.address || '');
          return;
        }
        // fallback to listing users and matching sessionStorage.userId
        $.get('/api/v1/users', function (resp) {
          const user = resp.rows.find((item) => String(item.id) === String(sessionStorage.getItem('userId') || ''));
          if (!user) return;
          $('#first_name').val(user.first_name || '');
          $('#last_name').val(user.last_name || '');
          $('#email').val(user.email || '');
          $('#phone').val(user.phone || '');
          $('#address').val(user.address || '');
        });
      }).fail(function () {
        // fallback if /me is not available
        $.get('/api/v1/users', function (resp) {
          const user = resp.rows.find((item) => String(item.id) === String(sessionStorage.getItem('userId') || ''));
          if (!user) return;
          $('#first_name').val(user.first_name || '');
          $('#last_name').val(user.last_name || '');
          $('#email').val(user.email || '');
          $('#phone').val(user.phone || '');
          $('#address').val(user.address || '');
        });
      });

      $('#profileForm').on('submit', function (event) {
        event.preventDefault();
        $.ajax({
          url: '/profile/edit',
          method: 'POST',
          data: $(this).serialize(),
          success: function () {
            $('#profileMessage').removeClass('hidden').text('Profile updated.');
          },
          error: function (xhr) {
            $('#profileMessage').removeClass('hidden').text(xhr.responseText || 'Unable to update profile.');
          }
        });
      });
    });
  </script>
</body>
</html>
