<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart</title>
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body>
  <main class="page">
    <header class="catalog-header">
      <div>
        <a href="/home" class="back-link">Home</a>
        <h1>My Cart</h1>
        <p>Review your selected school supplies.</p>
      </div>

      <div class="catalog-actions">
        <a class="secondary-button" href="/shop">Continue shopping</a>
        <form action="/auth/logout" method="POST">
          <button type="submit" class="danger-button">Logout</button>
        </form>
      </div>
    </header>

    <section class="cart-panel">
      <p id="cartEmpty" class="empty-message is-visible hidden">Your cart is empty.</p>

      <div id="cartWrap" class="cart-table-wrap hidden">
        <table class="cart-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Quantity</th>
              <th>Subtotal</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="cartItems"></tbody>
        </table>
      </div>

      <div class="cart-summary">
        <p id="cartMessage" aria-live="polite"></p>
        <div>
          <p>Total: PHP <strong id="cartTotal">0.00</strong></p>
          <a class="button-link" href="/checkout">Checkout</a>
        </div>
      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    $(function () {
      function money(value) {
        return Number(value).toFixed(2);
      }

      function renderEmpty() {
        $('#cartWrap').addClass('hidden');
        $('#cartEmpty').removeClass('hidden');
      }

      function renderCart(items, total) {
        const $body = $('#cartItems');
        $body.empty();

        if (!items.length) {
          renderEmpty();
          $('#cartTotal').text('0.00');
          return;
        }

        $('#cartWrap').removeClass('hidden');
        $('#cartEmpty').addClass('hidden');

        items.forEach(function (item) {
          $body.append(`
            <tr data-item-id="${item.cart_item_id}">
              <td>${item.product_name}</td>
              <td>PHP <span class="item-price">${money(item.price)}</span></td>
              <td>${item.stock_quantity || 0}</td>
              <td>
                <div class="quantity-controls">
                  <button type="button" class="cart-action" data-action="decrease">-</button>
                  <span class="item-quantity">${item.quantity}</span>
                  <button type="button" class="cart-action" data-action="increase">+</button>
                </div>
              </td>
              <td>PHP <span class="item-subtotal">${money(item.subtotal)}</span></td>
              <td><button type="button" class="cart-action remove-button" data-action="remove">Remove</button></td>
            </tr>
          `);
        });

        $('#cartTotal').text(money(total));
      }

      function loadCart() {
        $.ajax({
          url: '/api/v1/cart',
          method: 'GET',
          dataType: 'json',
          success: function (response) {
            renderCart(response.result.items || [], response.result.total || 0);
          },
          error: function (xhr) {
            $('#cartMessage').addClass('is-error').text(xhr.responseJSON?.message || 'Unable to load cart.');
          }
        });
      }

      $('#cartItems').on('click', '.cart-action', function () {
        const $button = $(this);
        const $row = $button.closest('tr');
        const itemId = $row.data('item-id');
        const action = $button.data('action');
        const methodMap = { increase: 'PUT', decrease: 'PUT', remove: 'DELETE' };
        const urlMap = {
          increase: `/api/v1/cart/${itemId}/increase`,
          decrease: `/api/v1/cart/${itemId}/decrease`,
          remove: `/api/v1/cart/${itemId}`
        };

        $.ajax({
          url: urlMap[action],
          method: methodMap[action],
          dataType: 'json',
          success: function () {
            const labelMap = {
              increase: 'Cart item quantity increased.',
              decrease: 'Cart item quantity decreased.',
              remove: 'Item removed from cart.',
            };
            showPopup(labelMap[action] || 'Cart updated.', 'success');
            loadCart();
          },
          error: function (xhr) {
            const message = xhr.responseJSON?.message || 'Unable to update cart.';
            $('#cartMessage').addClass('is-error').text(message);
            showPopup(message, 'error');
          }
        });
      });

      loadCart();
    });
  </script>
</body>
</html>
