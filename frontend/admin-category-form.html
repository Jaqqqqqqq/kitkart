<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><%= title %></title>
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body>
  <main class="page">
    <header class="catalog-header">
      <div>
        <a href="/admin/categories" class="back-link">Back to categories</a>
        <h1><%= title %></h1>
      </div>
    </header>

    <section class="cart-panel">
      <% if (error) { %>
        <p class="form-error"><%= error %></p>
      <% } %>

      <form
        action="<%= action %>"
        method="POST"
        class="admin-form js-admin-form js-api-form"
        id="categoryForm"
        data-api-url="<%= category.id ? '/api/v1/categories/' + category.id : '/api/v1/categories' %>"
        data-api-method="<%= category.id ? 'PUT' : 'POST' %>"
        data-redirect="/admin/categories"
        novalidate>
        <div class="form-field">
          <label for="category_name">Category name</label>
          <input id="category_name" name="category_name" value="<%= category.category_name %>" required>
          <p class="field-help"></p>
        </div>

        <div class="form-field">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="4"><%= category.description %></textarea>
          <p class="field-help"></p>
        </div>

        <button type="submit">Save category</button>
      </form>
    </section>
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/admin-crud.js"></script>
</body>
</html>
