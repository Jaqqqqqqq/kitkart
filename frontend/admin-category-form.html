<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category Form</title>
  <link rel="stylesheet" href="/css/catalog.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <main class="dashboard-panel">
    <p><a href="/admin/categories">Back</a></p>
    <h1 id="pageTitle">Category Form</h1>
    <form id="categoryForm">
      <div class="form-field"><label>Category Name</label><input id="category_name" required></div>
      <div class="form-field"><label>Description</label><textarea id="description" rows="4"></textarea></div>
      <button type="submit">Save</button>
    </form>
  </main>
  <script>
    $(function () {
      const match = window.location.pathname.match(/\/admin\/categories\/(\d+)\/edit/);
      const id = match ? match[1] : null;
      const apiUrl = id ? '/api/v1/categories/' + id : '/api/v1/categories';
      if (id) {
        $('#pageTitle').text('Edit Category');
        $.getJSON('/admin/api/categories/' + id, function (response) {
          $('#category_name').val(response.result.category_name || '');
          $('#description').val(response.result.description || '');
        });
      } else {
        $('#pageTitle').text('Add Category');
      }
      $('#categoryForm').on('submit', function (e) {
        e.preventDefault();
        $.ajax({
          method: id ? 'PUT' : 'POST',
          url: apiUrl,
          contentType: 'application/json',
          data: JSON.stringify({
            category_name: $('#category_name').val(),
            description: $('#description').val()
          }),
          success: function () { window.location.href = '/admin/categories'; },
          error: function (xhr) { alert(xhr.responseJSON?.message || 'Save failed.'); }
        });
      });
    });
  </script>
</body>
</html>
