<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Details</title>
  <link rel="stylesheet" href="/css/catalog.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <main class="dashboard-panel">
    <p><a href="/admin/orders">Back to orders</a></p>
    <h1 id="orderTitle">Order Details</h1>
    <div id="orderMeta"></div>
    <table class="data-table" id="orderItemsTable">
      <thead>
        <tr>
          <th>Item</th>
          <th>Price</th>
          <th>Qty</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <p><strong>Total:</strong> <span id="orderTotal"></span></p>
  </main>
  <script>
    $(function () {
      const orderId = window.location.pathname.split('/').filter(Boolean).pop();
      $.getJSON('/admin/api/orders/' + orderId, function (response) {
        const order = response.result;
        $('#orderTitle').text('Order #' + order.id);
        $('#orderMeta').html(order.first_name + ' ' + order.last_name + '<br>' + order.email + '<br>' + order.payment_method);
        $('#orderTotal').text('PHP ' + Number(order.total).toFixed(2));
        const html = (order.items || []).map((item) => {
          const cancelDisabled = item.status !== 'Pending' ? 'disabled' : '';
          return `
            <tr>
              <td>${item.product_name}</td>
              <td>PHP ${Number(item.price).toFixed(2)}</td>
              <td>${item.quantity}</td>
              <td>
                <select class="status-select" data-id="${item.id}">
                  ${['Pending','Shipped','Delivered','Cancelled'].map((status) => `<option value="${status}" ${item.status === status ? 'selected' : ''} ${(status === 'Cancelled' && item.status !== 'Pending') ? 'disabled' : ''}>${status}</option>`).join('')}
                </select>
              </td>
              <td><button class="update-status-btn" data-id="${item.id}" ${cancelDisabled}>Update</button></td>
            </tr>`;
        }).join('');
        $('#orderItemsTable tbody').html(html || '<tr><td colspan="5">No items.</td></tr>');
      });

      $(document).on('click', '.update-status-btn', function () {
        const itemId = $(this).data('id');
        const status = $('.status-select[data-id="' + itemId + '"]').val();
        $.ajax({
          method: 'PUT',
          url: '/admin/orders/items/' + itemId + '/status',
          contentType: 'application/json',
          data: JSON.stringify({ status }),
          success: function () {
            alert('Updated.');
            location.reload();
          },
          error: function (xhr) {
            alert(xhr.responseJSON?.message || 'Update failed.');
          }
        });
      });
    });
  </script>
</body>
</html>
