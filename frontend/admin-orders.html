<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders</title>
  <link rel="stylesheet" href="/css/catalog.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <main class="page">
    <header class="catalog-header">
      <div>
        <a href="/admin/dashboard" class="back-link">Dashboard</a>
        <p class="eyebrow">Transactions</p>
        <h1>Orders</h1>
        <p class="meta-copy">Review customer orders and update item fulfillment from the details page.</p>
      </div>
    </header>

    <section class="cart-panel">
      <div class="cart-table-wrap">
        <table class="data-table cart-table" id="ordersTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Customer</th>
              <th>Payment</th>
              <th>Items</th>
              <th>Total</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>
  <script>
    $(function () {
      $.getJSON('/admin/api/orders', function (response) {
        const rows = response.rows || [];
        const html = rows.map((order) => `
          <tr>
            <td>#${order.id}</td>
            <td><strong>${order.first_name} ${order.last_name}</strong><span class="table-subtext">${order.email}</span></td>
            <td>${order.payment_method}</td>
            <td>${order.item_count}</td>
            <td>PHP ${Number(order.total).toFixed(2)}</td>
            <td><a href="/admin/orders/${order.id}" class="action-link">View</a></td>
          </tr>
        `).join('');
        $('#ordersTable tbody').html(html || '<tr><td colspan="6">No orders found.</td></tr>');
      });
    });
  </script>
</body>
</html>
