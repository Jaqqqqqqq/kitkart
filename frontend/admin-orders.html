<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders</title>
  <link rel="stylesheet" href="/css/catalog.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <main class="dashboard-panel">
    <h1>Orders</h1>
    <p><a href="/admin/dashboard">Back to dashboard</a></p>
    <table class="data-table" id="ordersTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Customer</th>
          <th>Payment</th>
          <th>Items</th>
          <th>Total</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>
  <script>
    $(function () {
      $.getJSON('/admin/api/orders', function (response) {
        const rows = response.rows || [];
        const html = rows.map((order) => `
          <tr>
            <td>#${order.id}</td>
            <td>${order.first_name} ${order.last_name}<br>${order.email}</td>
            <td>${order.payment_method}</td>
            <td>${order.item_count}</td>
            <td>PHP ${Number(order.total).toFixed(2)}</td>
            <td><a href="/admin/orders/${order.id}">View</a></td>
          </tr>
        `).join('');
        $('#ordersTable tbody').html(html || '<tr><td colspan="6">No orders found.</td></tr>');
      });
    });
  </script>
</body>
</html>
