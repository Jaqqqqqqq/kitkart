<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Review</title>
  <link rel="stylesheet" href="/css/catalog.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/js/ui.js"></script>
</head>
<body>
  <main class="dashboard-panel">
    <h1>Edit Review</h1>
    <form id="reviewForm">
      <select id="rating">
        <option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option>
      </select>
      <textarea id="review_text"></textarea>
      <button type="submit">Save</button>
      <button type="button" id="deleteBtn">Delete</button>
    </form>
  </main>
  <script>
    $(function () {
      const reviewId = window.location.pathname.split('/').filter(Boolean)[1];
      $('#reviewForm').on('submit', function (e) {
        e.preventDefault();
        $.ajax({
          method: 'POST',
          url: '/reviews/' + reviewId + '/edit',
          data: { rating: $('#rating').val(), review_text: $('#review_text').val() },
          dataType: 'json',
          success: function (data) { if (data && data.success) { window.location.href = '/shop/' + (data.productId || ''); } else { showPopup(data?.message || 'Save failed.', 'error'); } },
          error: function (xhr) { showPopup(xhr.responseJSON?.message || xhr.responseText || 'Save failed.', 'error'); }
        });
      });
      $('#deleteBtn').on('click', function () {
        $.ajax({
          method: 'POST',
          url: '/reviews/' + reviewId + '/delete',
          dataType: 'json',
          success: function (data) { if (data && data.success) { window.location.href = '/shop'; } else { showPopup(data?.message || 'Delete failed.', 'error'); } },
          error: function (xhr) { showPopup(xhr.responseJSON?.message || xhr.responseText || 'Delete failed.', 'error'); }
        });
      });
    });
  </script>
</body>
</html>
