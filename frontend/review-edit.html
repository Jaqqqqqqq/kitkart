<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><%= title %></title>
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body>
  <main class="page">
    <header class="catalog-header">
      <div>
        <a href="/shop/<%= review.product_id %>" class="back-link">Back to product</a>
        <h1>Edit Review</h1>
        <p><%= review.product_name %></p>
      </div>
    </header>

    <section class="cart-panel">
      <% if (error) { %>
        <p class="form-error"><%= error %></p>
      <% } %>

      <form action="/reviews/<%= review.id %>/edit" method="POST" class="review-form">
        <label for="rating">Rating</label>
        <select id="rating" name="rating" required>
          <% for (let rating = 5; rating >= 1; rating -= 1) { %>
            <option value="<%= rating %>" <%= Number(review.rating) === rating ? 'selected' : '' %>>
              <%= rating %> star<%= rating === 1 ? '' : 's' %>
            </option>
          <% } %>
        </select>

        <label for="review_text">Review</label>
        <textarea id="review_text" name="review_text" rows="5" required><%= review.review_text || '' %></textarea>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Save Review</button>
          <button type="button" class="btn-danger delete-review-btn" data-review-id="<%= review.id %>">Delete Review</button>
        </div>
      </form>
    </section>
  </main>

  <!-- Delete Confirmation Modal -->
  <div id="deleteConfirmModal" class="confirm-modal" style="display: none;">
    <div class="confirm-modal-overlay"></div>
    <div class="confirm-modal-content">
      <h2>Delete Review</h2>
      <p>Are you sure you want to delete this review? This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="confirmDeleteBtn" class="btn-danger">Delete</button>
        <button id="cancelDeleteBtn" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    $(document).ready(function() {
      let reviewIdToDelete = null;

      // Open delete confirmation modal
      $('.delete-review-btn').on('click', function() {
        reviewIdToDelete = $(this).data('review-id');
        $('#deleteConfirmModal').fadeIn();
      });

      // Confirm delete
      $('#confirmDeleteBtn').on('click', function() {
        if (reviewIdToDelete) {
          const form = $('<form>', {
            action: '/reviews/' + reviewIdToDelete + '/delete',
            method: 'POST'
          });
          $('body').append(form);
          form.submit();
        }
      });

      // Cancel delete
      $('#cancelDeleteBtn').on('click', function() {
        $('#deleteConfirmModal').fadeOut();
        reviewIdToDelete = null;
      });

      // Close modal when clicking overlay
      $('.confirm-modal-overlay').on('click', function() {
        $('#deleteConfirmModal').fadeOut();
        reviewIdToDelete = null;
      });
    });
  </script>
</body>
</html>
