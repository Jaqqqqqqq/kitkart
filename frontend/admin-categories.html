<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories</title>
  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css">
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body>
  <main class="page">
    <header class="catalog-header">
      <div>
        <a href="/admin/dashboard" class="back-link">Dashboard</a>
        <p class="eyebrow">Catalog</p>
        <h1>Categories</h1>
        <p class="meta-copy">Keep the store organized by class, subject, or supply type.</p>
      </div>
      <a href="/admin/categories/new" class="button-link">Add category</a>
    </header>

    <section class="cart-panel">
      <div class="cart-table-wrap">
        <table id="categoriesTable" class="cart-table display">
          <thead>
            <tr>
              <th>Name</th>
              <th>Description</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="categoriesBody"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
  <script src="/js/admin-crud.js"></script>
  <script>
    $(function () {
      $.get('/api/v1/categories', function (response) {
        const categories = response.rows || [];
        const $body = $('#categoriesBody');
        $body.empty();
        categories.forEach(function (category) {
          $body.append(`
            <tr id="category-row-${category.id}">
              <td>${category.category_name}</td>
              <td>${category.description || '-'}</td>
              <td>
                <a href="/admin/categories/${category.id}/edit" class="action-link">Edit</a>
                <form action="/admin/categories/${category.id}/delete" method="POST" class="inline-form js-api-delete" data-api-url="/api/v1/categories/${category.id}" data-row="#category-row-${category.id}">
                  <button type="submit" class="remove-button">Delete</button>
                </form>
              </td>
            </tr>
          `);
        });
        $('#categoriesTable').DataTable({ pageLength: 10, lengthChange: false, order: [[0, 'asc']] });
      });
    });
  </script>
</body>
</html>
