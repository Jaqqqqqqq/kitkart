<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Accounts</title>
  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css">
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body>
  <main class="page">
    <header class="catalog-header">
      <div>
        <a href="/admin/dashboard" class="back-link">Dashboard</a>
        <p class="eyebrow">Management</p>
        <h1>User Accounts</h1>
        <p class="meta-copy">Update roles and account access without leaving the table.</p>
      </div>
    </header>
    <section class="cart-panel">
      <div class="cart-table-wrap">
        <table id="usersTable" class="cart-table display">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Phone</th>
              <th>Address</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>
    </section>
  </main>
  <div id="toast" class="msg-toast"></div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
  <script>
    $(function () {
      function showToast(message, type) {
        $('#toast').text(message).attr('class', 'msg-toast ' + type).show();
        setTimeout(function () { $('#toast').hide(); }, 2500);
      }

      function loadUsers() {
        $.get('/api/v1/users', function (response) {
          const users = response.rows || [];
          const $body = $('#usersBody');
          $body.empty();

          users.forEach(function (user) {
            $body.append(`
              <tr id="user-row-${user.id}">
                <td>${user.first_name} ${user.last_name}</td>
                <td>${user.email}</td>
                <td id="role-cell-${user.id}">${user.role}</td>
                <td><span id="status-badge-${user.id}" class="status-badge ${user.status}">${user.status}</span></td>
                <td>${user.phone || '-'}</td>
                <td>${user.address || '-'}</td>
                <td>
                  <select id="role-select-${user.id}" class="role-select">
                    <option value="customer" ${user.role === 'customer' ? 'selected' : ''}>Customer</option>
                    <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                  </select>
                  <button type="button" class="user-action-btn role-btn" onclick="updateRole(${user.id})">Update Role</button>
                  <button type="button" id="status-btn-${user.id}" class="user-action-btn ${user.status === 'active' ? 'deactivate-btn' : 'activate-btn'}" onclick="updateStatus(${user.id}, '${user.status === 'active' ? 'inactive' : 'active'}')">
                    ${user.status === 'active' ? 'Deactivate' : 'Activate'}
                  </button>
                </td>
              </tr>
            `);
          });

          $('#usersTable').DataTable({
            pageLength: 10,
            lengthChange: false,
            order: [[0, 'asc']]
          });
        });
      }

      window.updateRole = function (userId) {
        const role = $('#role-select-' + userId).val();
        $.ajax({
          url: '/admin/users/' + userId + '/role',
          method: 'POST',
          contentType: 'application/json',
          dataType: 'json',
          data: JSON.stringify({ role }),
          success: function (data) {
            if (data.success) {
              $('#role-cell-' + userId).text(role);
              showToast('Role updated to ' + role + '.', 'success');
            } else {
              showToast(data.message || 'Failed to update role.', 'error');
            }
          },
          error: function (xhr) {
            showToast(xhr.responseJSON?.message || 'Request failed.', 'error');
          }
        });
      };

      window.updateStatus = function (userId, newStatus) {
        $.ajax({
          url: '/admin/users/' + userId + '/status',
          method: 'POST',
          contentType: 'application/json',
          dataType: 'json',
          data: JSON.stringify({ status: newStatus }),
          success: function (data) {
            if (data.success) {
              const badge = $('#status-badge-' + userId);
              badge.text(newStatus).attr('class', 'status-badge ' + newStatus);
              const btn = $('#status-btn-' + userId);
              if (newStatus === 'inactive') {
                btn.text('Activate').removeClass('deactivate-btn').addClass('activate-btn').off('click').on('click', function () { updateStatus(userId, 'active'); });
              } else {
                btn.text('Deactivate').removeClass('activate-btn').addClass('deactivate-btn').off('click').on('click', function () { updateStatus(userId, 'inactive'); });
              }
              showToast('Account ' + newStatus + '.', 'success');
            } else {
              showToast(data.message || 'Failed to update status.', 'error');
            }
          },
          error: function (xhr) {
            showToast(xhr.responseJSON?.message || 'Request failed.', 'error');
          }
        });
      };

      loadUsers();
    });
  </script>
</body>
</html>
